# Node gateway — PUBLIC. The browser/extension talks to this app only.
app = "jorge-livetranslate-gw"
primary_region = "iad"

[build]

[env]
  # Reach the private AI service over Fly's internal network (IPv6, no public IP).
  AI_SERVICE_URL = "http://jorge-livetranslate-ai.internal:8000"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
